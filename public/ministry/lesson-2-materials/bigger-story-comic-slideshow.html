<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Bigger Story &middot; Acts 6:1&ndash;7 Companion</title>
<style>
  :root {
    --cream: #f5f1f0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  .slideshow {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: pointer;
    background: var(--cream);
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease;
  }
  .slide.is-active {
    opacity: 1;
    pointer-events: auto;
  }
  .slide-panel,
  .slide-art {
    width: 100%;
    height: 100%;
  }
  .slide-art {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .slide-art img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>
<div class="slideshow" role="region" aria-label="Comic slideshow">
    <section class="slide">
      <div class="slide-panel">
        <div class="slide-art">
          <img src="illustrations/slide_60_small_story_big_story__f48753814b00.png" alt="">
        </div>
      </div>
    </section>
    <section class="slide">
      <div class="slide-panel">
        <div class="slide-art">
          <img src="illustrations/slide_61_stephen_first_martyr__50969e698d7e.png" alt="">
        </div>
      </div>
    </section>
    <section class="slide">
      <div class="slide-panel">
        <div class="slide-art">
          <img src="illustrations/slide_62_philip_and_ethiopian__d6006b11e5e8.png" alt="">
        </div>
      </div>
    </section>
    <section class="slide">
      <div class="slide-panel">
        <div class="slide-art">
          <img src="illustrations/slide_30_seven_men_lineup__432561df59d1.png" alt="">
        </div>
      </div>
    </section>
</div>
<script>
(function () {
  var slideshow = document.querySelector('.slideshow');
  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var current = 0;

  function render() {
    slides.forEach(function (s, i) { s.classList.toggle('is-active', i === current); });
  }
  function go(delta) {
    var next = current + delta;
    if (next < 0 || next >= slides.length) return;
    current = next;
    render();
  }
  function next() { go(1); }
  function prev() { go(-1); }
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown' || e.key === 'j') {
      e.preventDefault();
      next();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'k') {
      e.preventDefault();
      prev();
    } else if (e.key === 'Home') {
      current = 0;
      render();
    } else if (e.key === 'End') {
      current = slides.length - 1;
      render();
    } else if (e.key === 'f' || e.key === 'F') {
      toggleFullscreen();
    }
  });

  slideshow.addEventListener('click', function () { next(); });

  var touchStartX = null, touchStartY = null;
  slideshow.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  slideshow.addEventListener('touchend', function (e) {
    if (touchStartX === null) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    var absX = Math.abs(dx), absY = Math.abs(dy);
    var threshold = 40;
    if (Math.max(absX, absY) < threshold) {
      // tap — already handled by click
    } else if (absX > absY) {
      if (dx < 0) next(); else prev();
    } else {
      if (dy < 0) next(); else prev();
    }
    touchStartX = touchStartY = null;
  }, { passive: true });

  var wheelLock = false;
  slideshow.addEventListener('wheel', function (e) {
    if (wheelLock) return;
    if (Math.abs(e.deltaY) < 30) return;
    wheelLock = true;
    if (e.deltaY > 0) next(); else prev();
    setTimeout(function () { wheelLock = false; }, 700);
  }, { passive: true });

  render();
})();
</script>
</body>
</html>
