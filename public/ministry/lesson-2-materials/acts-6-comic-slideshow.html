<title>Acts 6:1&ndash;7 &middot; The Word of God Increases</title>
<style>
  :root {
    --cream: #f5f1f0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  .slideshow {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: pointer;
    background: var(--cream);
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease;
  }
  .slide.is-active {
    opacity: 1;
    pointer-events: auto;
  }
  .slide-panel,
  .slide-art {
    width: 100%;
    height: 100%;
  }
  .slide-art {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .slide-art img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  /* Hide cursor in fullscreen for clean projector view */
  html:fullscreen .slideshow,
  html:-webkit-full-screen .slideshow { cursor: none; }
</style>
</head>

<script>
(function () {
  var slideshow = document.querySelector('.slideshow');
  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var current = 0;
  var hasTriedFullscreen = false;

  function render() {
    slides.forEach(function (s, i) { s.classList.toggle('is-active', i === current); });
  }
  function go(delta) {
    var next = current + delta;
    if (next < 0 || next >= slides.length) return;
    current = next;
    render();
  }
  function next() { go(1); }
  function prev() { go(-1); }
  function enterFullscreen() {
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) { try { req.call(el); } catch (e) {} }
  }
  function exitFullscreen() {
    var fn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if (fn) { try { fn.call(document); } catch (e) {} }
  }
  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
  }
  function toggleFullscreen() {
    if (isFullscreen()) exitFullscreen(); else enterFullscreen();
  }
  // First user interaction: enter fullscreen silently and DON'T advance/act.
  // Subsequent interactions navigate normally.
  function gateFullscreen() {
    if (hasTriedFullscreen) return false;
    hasTriedFullscreen = true;
    if (!isFullscreen()) {
      enterFullscreen();
      return true; // intercepted — caller should not also advance
    }
    return false;
  }

  document.addEventListener('keydown', function (e) {
    var navKey =
      e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' ||
      e.key === 'PageDown' || e.key === 'j' ||
      e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'k' ||
      e.key === 'Home' || e.key === 'End';
    if (navKey && gateFullscreen()) { e.preventDefault(); return; }

    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown' || e.key === 'j') {
      e.preventDefault();
      next();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp' || e.key === 'k') {
      e.preventDefault();
      prev();
    } else if (e.key === 'Home') {
      current = 0;
      render();
    } else if (e.key === 'End') {
      current = slides.length - 1;
      render();
    } else if (e.key === 'f' || e.key === 'F') {
      toggleFullscreen();
    }
  });

  slideshow.addEventListener('click', function () {
    if (gateFullscreen()) return;
    next();
  });

  var touchStartX = null, touchStartY = null;
  slideshow.addEventListener('touchstart', function (e) {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  slideshow.addEventListener('touchend', function (e) {
    if (touchStartX === null) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    var absX = Math.abs(dx), absY = Math.abs(dy);
    var threshold = 40;
    if (Math.max(absX, absY) < threshold) {
      // tap — handled by click handler above
    } else {
      if (gateFullscreen()) { touchStartX = touchStartY = null; return; }
      if (absX > absY) {
        if (dx < 0) next(); else prev();
      } else {
        if (dy < 0) next(); else prev();
      }
    }
    touchStartX = touchStartY = null;
  }, { passive: true });

  var wheelLock = false;
  slideshow.addEventListener('wheel', function (e) {
    if (wheelLock) return;
    if (Math.abs(e.deltaY) < 30) return;
    if (gateFullscreen()) return;
    wheelLock = true;
    if (e.deltaY > 0) next(); else prev();
    setTimeout(function () { wheelLock = false; }, 700);
  }, { passive: true });

  render();
})();
</script>
